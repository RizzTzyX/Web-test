<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excellent Dashboard Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.9);
            --primary-blue: #2563eb;
            --accent-blue: #60a5fa;
            --text-dark: #0f172a;
            --border: rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { background: var(--bg); color: var(--text-dark); overflow-x: hidden; }

        /* --- NAV BAR --- */
        nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 12px 30px; border-radius: 50px; display: flex; gap: 35px;
            border: 1px solid white; box-shadow: 0 10px 40px rgba(0,0,0,0.08); z-index: 1000;
        }
        .nav-link { cursor: pointer; color: #94a3b8; transition: 0.3s; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 700; }
        .nav-link.active { color: var(--primary-blue); transform: translateY(-5px); }

        /* --- PAGES --- */
        .page { display: none; min-height: 100vh; padding: 60px 20px 120px; }
        .page.active { display: block; animation: pageIn 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes pageIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .container { max-width: 1100px; margin: 0 auto; }

        /* --- DASHBOARD: Header & Kelas --- */
        .class-header { text-align: center; margin-bottom: 60px; }
        .class-logo { 
            font-family: 'Space Grotesk', sans-serif; font-size: 80px; font-weight: 800;
            background: linear-gradient(180deg, #2563eb 0%, #60a5fa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(37, 99, 235, 0.2));
            letter-spacing: -4px;
        }

        /* --- GRID IDENTITAS (4 Baris) --- */
        .member-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 80px;
        }
        .member-box {
            background: white; padding: 20px; border-radius: 24px; border: 1px solid var(--border);
            text-align: center; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: boxFloat 5s ease-in-out infinite;
        }
        .member-box:hover { transform: scale(1.05) translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); border-color: var(--primary-blue); }
        .member-box img { width: 100%; aspect-ratio: 1; background: #f1f5f9; border-radius: 16px; margin-bottom: 12px; object-fit: cover; }
        .member-box h3 { font-size: 15px; font-weight: 700; color: var(--text-dark); }
        
        @keyframes boxFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* --- PELANGI INTERAKTIF --- */
        .interactive-area {
            background: white; border-radius: 40px; padding: 50px; text-align: center;
            border: 1px solid var(--border); position: relative; overflow: hidden;
        }
        .rainbow-text-container {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
        }
        .particle-name {
            font-size: 24px; font-weight: 800; cursor: pointer; padding: 10px 20px;
            border-radius: 50px; transition: 0.3s; user-select: none; display: inline-block;
        }

        /* --- MODAL --- */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.1);
            backdrop-filter: blur(20px); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 40px; border-radius: 32px; width: 90%; max-width: 400px;
            text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.1);
        }

        /* --- JADWAL & KENANGAN (Tetap berfungsi) --- */
        .schedule-wrapper { display: flex; overflow-x: auto; gap: 20px; padding-bottom: 20px; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .day-column { min-width: 320px; background: white; border-radius: 30px; padding: 30px; scroll-snap-align: start; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .scroll-v { max-height: 400px; overflow-y: auto; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .photo-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .img-box { width: 100%; height: 220px; background: #e2e8f0; display: flex; align-items: center; justify-content: center; }

    </style>
</head>
<body>

    <div id="idModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="m-img" style="width:100px; height:100px; background:#f1f5f9; border-radius:25px; margin:0 auto 20px;"></div>
            <h2 id="m-name">Nama Lengkap</h2>
            <div id="m-data" style="text-align:left; margin-top:20px; color:#64748b; font-size:14px; line-height:2;"></div>
            <button onclick="document.getElementById('idModal').style.display='none'" style="margin-top:30px; width:100%; padding:15px; border-radius:15px; border:none; background:var(--text-dark); color:white; font-weight:700; cursor:pointer;">Close</button>
        </div>
    </div>

    <nav>
        <div class="nav-link active" onclick="showPage('home', this)"><i data-lucide="layout-grid"></i><span>Home</span></div>
        <div class="nav-link" onclick="showPage('sch', this)"><i data-lucide="calendar-days"></i><span>Jadwal</span></div>
        <div class="nav-link" onclick="showPage('mem', this)"><i data-lucide="camera"></i><span>Momen</span></div>
    </nav>

    <section id="home" class="page active">
        <div class="container">
            <div class="class-header">
                <p style="text-transform:uppercase; letter-spacing:4px; font-weight:800; color:var(--primary-blue); font-size:12px; margin-bottom:10px;">Official Dashboard</p>
                <h1 class="class-logo">EXCELLENT.</h1>
            </div>

            <div class="member-grid" id="memberGrid">
                </div>

            <div class="interactive-area">
                <h2 style="margin-bottom:30px; font-size:18px; color:#94a3b8;">Interactive Class Name (Touch to Explode)</h2>
                <div class="rainbow-text-container" id="particleContainer"></div>
            </div>
        </div>
    </section>

    <section id="sch" class="page">
        <div class="container">
            <h1 style="font-size:40px; margin-bottom:30px;">Schedules.</h1>
            <div class="schedule-wrapper">
                <div class="day-column">
                    <h2 style="color:var(--primary-blue); margin-bottom:20px;">Senin</h2>
                    <div class="scroll-v">
                        <div style="background:#f1f5f9; padding:20px; border-radius:20px; margin-bottom:15px;">
                            <h4>Pelajaran</h4><p style="font-size:13px; color:#64748b;">MTK, Fisika, B.Indo</p>
                        </div>
                        <div style="background:#f1f5f9; padding:20px; border-radius:20px; margin-bottom:15px;">
                            <h4>Piket</h4><p style="font-size:13px; color:#64748b;">Andi, Budi, Citra</p>
                        </div>
                    </div>
                </div>
                <div class="day-column">
                    <h2 style="color:var(--primary-blue); margin-bottom:20px;">Selasa</h2>
                    <div class="scroll-v">
                        <div style="background:#f1f5f9; padding:20px; border-radius:20px; margin-bottom:15px;">
                            <h4>Pelajaran</h4><p style="font-size:13px; color:#64748b;">Kimia, Biologi, Seni</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="mem" class="page">
        <div class="container">
            <h1 style="font-size:40px; margin-bottom:30px;">Memories.</h1>
            <div class="gallery-grid">
                <div class="photo-card">
                    <div class="img-box"><i data-lucide="image" color="#cbd5e1"></i></div>
                    <div style="padding:20px;"><h5>Gedung Sate Tour</h5><p style="font-size:12px; color:#94a3b8;">Kunjungan Industri 2026</p></div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // DATA MASTER (Edit di sini)
        const members = [
            { name: "Andi Wijaya", nick: "Andi", age: 17, birth: "12 Mar 2009", role: "Ketua", hobby: "Futsal" },
            { name: "Budi Santoso", nick: "Budi", age: 17, birth: "05 Jan 2009", role: "Sekretaris", hobby: "Gaming" },
            { name: "Citra Lestari", nick: "Citra", age: 16, birth: "21 Okt 2009", role: "Bendahara", hobby: "Musik" },
            { name: "Dedi Kurniawan", nick: "Dedi", age: 17, birth: "15 Apr 2009", role: "Anggota", hobby: "Basket" },
            { name: "Eka Putri", nick: "Eka", age: 16, birth: "30 Des 2009", role: "Anggota", hobby: "Melukis" },
            { name: "Fajar Pratama", nick: "Fajar", age: 17, birth: "11 Feb 2009", role: "Anggota", hobby: "Coding" }
        ];

        // Render Member Grid
        const grid = document.getElementById('memberGrid');
        members.forEach((m, i) => {
            const box = document.createElement('div');
            box.className = 'member-box';
            box.style.animationDelay = (i * 0.2) + 's';
            box.innerHTML = `<img src="" alt="FOTO"><h3>${m.nick}</h3>`;
            box.onclick = () => {
                document.getElementById('m-name').innerText = m.name;
                document.getElementById('m-data').innerHTML = `
                    <b>Lahir:</b> ${m.birth}<br>
                    <b>Umur:</b> ${m.age} Tahun<br>
                    <b>Jabatan:</b> ${m.role}<br>
                    <b>Hobi:</b> ${m.hobby}
                `;
                document.getElementById('idModal').style.display = 'flex';
            };
            grid.appendChild(box);
        });

        // Particle Rainbow Names
        const pContainer = document.getElementById('particleContainer');
        const colors = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899'];
        
        members.forEach(m => {
            const p = document.createElement('div');
            p.className = 'particle-name';
            p.innerText = m.name;
            const randColor = colors[Math.floor(Math.random() * colors.length)];
            p.style.color = randColor;
            p.style.border = `2px solid ${randColor}22`;
            
            p.onmouseover = () => {
                p.style.background = randColor;
                p.style.color = 'white';
                p.style.transform = `scale(1.2) rotate(${Math.random() * 10 - 5}deg)`;
            };
            
            p.onmouseleave = () => {
                p.style.background = 'transparent';
                p.style.color = randColor;
                p.style.transform = 'scale(1) rotate(0deg)';
            };

            // Efek Balon Pecah saat diklik
            p.onclick = () => {
                p.style.transform = 'scale(3)';
                p.style.opacity = '0';
                setTimeout(() => {
                    p.style.transform = 'scale(1)';
                    p.style.opacity = '1';
                }, 1000);
            };

            pContainer.appendChild(p);
        });

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
            window.scrollTo(0,0);
        }

        lucide.createIcons();
    </script>
</body>
  </html>
